<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Idiom Galaxy Defense</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0c15;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1c29 0%, #000000 100%);
        }

        /* UI Layers */
        .ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* Top HUD */
        .hud-top {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px #00ffff;
        }

        .score-box {
            font-size: 24px;
            color: #00ffff;
        }

        .lives-box {
            font-size: 24px;
            color: #ff0055;
        }

        .progress-box {
            font-size: 18px;
            color: #ffff00;
            margin-top: 5px;
        }

        /* Idiom Display (Center Top) */
        #current-mission {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 90%;
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: translateX(-50%) scale(1);
            }

            50% {
                transform: translateX(-50%) scale(1.02);
            }

            100% {
                transform: translateX(-50%) scale(1);
            }
        }

        #idiom-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #00ffff;
            display: inline-block;
        }

        #idiom-meaning {
            font-size: 16px;
            color: #aaaaaa;
            margin-top: 5px;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
        }

        .highlight {
            color: #ffff00;
            text-decoration: underline;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 12, 21, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: auto;
            transition: opacity 0.3s;
            overflow-y: auto;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            margin: 0 0 20px 0;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-align: center;
        }

        .btn {
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            min-width: 250px;
        }

        .btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }

        .btn:disabled {
            border-color: #555;
            color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-ai {
            border-color: #ff00ff;
            color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        .btn-ai:hover {
            background: #ff00ff;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
        }

        .btn-stats {
            border-color: #ffff00;
            color: #ffff00;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.2);
        }

        .btn-stats:hover {
            background: #ffff00;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.6);
        }

        .instructions {
            text-align: center;
            max-width: 600px;
            color: #ccc;
            line-height: 1.6;
        }

        /* Inputs Style */
        .input-sci-fi {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            color: #fff;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            text-align: center;
            margin: 5px;
            border-radius: 5px;
            outline: none;
            width: 250px;
        }

        .input-sci-fi:focus {
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* AI Modal Styles */
        .ai-input-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        #ai-topic-input {
            padding: 10px;
            font-family: 'Roboto', sans-serif;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff00ff;
            color: #fff;
            border-radius: 4px;
            width: 200px;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ff00ff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Canvas */
        canvas {
            display: block;
        }

        /* Effects */
        .shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(4px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-8px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(8px, 0, 0);
            }
        }

        /* New Explanation Box Style */
        .explanation-card {
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #ff0055;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            max-width: 90%;
            width: 500px;
            max-height: 40vh;
            /* Permite scroll si hay muchos errores */
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 4px;
        }

        .explanation-card::-webkit-scrollbar-thumb {
            background: #ff0055;
        }

        .mistake-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 0;
            text-align: left;
        }

        .mistake-item:last-child {
            border-bottom: none;
        }

        .mistake-phrase {
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .mistake-meaning {
            color: #ccc;
            font-size: 14px;
            font-style: italic;
        }

        /* Admin Lock Styles */
        .admin-lock-panel {
            margin-top: 20px;
            background: rgba(20, 0, 0, 0.8);
            border: 1px solid #ff0000;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .error-msg {
            color: red;
            font-size: 12px;
            display: none;
        }

        /* STATS TABLE STYLES */
        .stats-container {
            width: 90%;
            max-width: 800px;
            height: 70vh;
            background: rgba(0, 20, 40, 0.95);
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Roboto', sans-serif;
            margin-top: 10px;
        }

        .stats-table th,
        .stats-table td {
            border: 1px solid #334455;
            padding: 12px;
            text-align: left;
        }

        .stats-table th {
            background-color: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 2;
        }

        .stats-table tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .stats-table tr:hover {
            background-color: rgba(0, 255, 255, 0.1);
        }

        .rank-cell {
            font-family: 'Orbitron';
            color: #ffff00;
            text-align: center;
        }

        .score-cell {
            font-weight: bold;
            color: #00ffff;
        }

        .stats-subtitle {
            color: #ff00ff;
            font-family: 'Orbitron';
            font-size: 16px;
            margin-top: 30px;
            margin-bottom: 10px;
            border-bottom: 1px solid #ff00ff;
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        /* Leaderboard Box */
        .leaderboard-box {
            margin-top: 20px;
            background: rgba(0, 0, 20, 0.8);
            border: 1px solid #00ffff;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
            text-align: center;
        }

        .lb-title {
            color: #00ffff;
            font-family: 'Orbitron';
            font-size: 18px;
            margin-bottom: 10px;
            text-decoration: underline;
        }

        .lb-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        .lb-highlight {
            color: #ffff00;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <div class="ui-layer">
            <div class="hud-top">
                <div class="score-box">SCORE: <span id="score">0</span></div>
                <div class="lives-box">LIVES: <span id="lives">3</span></div>
            </div>
            <div style="position:absolute; top: 10px; left: 50%; transform: translateX(-50%); text-align: center;">
                <div class="progress-box">MISIONES: <span id="progress-count">0</span>/15</div>
            </div>

            <div id="current-mission" class="hidden">
                <div id="idiom-text">Break a <span style="color:#ff0055">____</span></div>
                <div id="idiom-meaning">Meaning: Good Luck</div>
            </div>
        </div>

        <div id="start-screen" class="screen">
            <h1>Idiom Galaxy</h1>

            <div class="instructions" style="margin-bottom: 20px;">
                <p>Ingresa tus datos para comenzar la misión.</p>
                <input type="text" id="player-name" class="input-sci-fi" placeholder="Nombre Real">
                <input type="number" id="player-group" class="input-sci-fi" placeholder="Número de Grupo">
                <p id="start-error" class="error-msg" style="color: #ff0055; margin-top:5px; display:none;">Debes
                    rellenar nombre y grupo</p>
            </div>

            <button class="btn" onclick="startGame()">START MISSION</button>
            <button class="btn btn-ai" onclick="toggleAIModal()">✨ Custom Mission</button>
            <button class="btn btn-stats" style="margin-top: 10px;" onclick="showStats()">VER ESTADÍSTICAS</button>

            <div id="leaderboard-display" class="leaderboard-box">
                <div class="lb-title">ESTADO LOCAL</div>
                <div class="lb-row">
                    <span>Último Jugador:</span>
                    <span id="lb-last-player" class="lb-highlight">-</span>
                </div>
            </div>

            <div id="ai-modal"
                style="display:none; margin-top:20px; background:rgba(0,0,0,0.8); padding:20px; border-radius:10px; border:1px solid #ff00ff;">
                <p style="color:#ff00ff; margin:0 0 10px 0;">Create a custom level</p>
